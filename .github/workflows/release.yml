name: Release

# Package the app and publish installers to a GitHub Release when a version tag is pushed.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Package (${{ matrix.os }})
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # node-gyp (via node-pty) still imports distutils, removed in Python 3.12+.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      # Same as the test job: install without lifecycle scripts, then build
      # native modules for system Node so `npm test` (which runs under
      # system Node) can load them. The Electron binary is downloaded on
      # its own before tests because some tests import `electron` and fail
      # if the binary is missing. After tests, the postinstall rebuilds
      # native modules for Electron's ABI, which the build/package steps
      # need. See scripts/rebuild-native-for-node.sh for full rationale.
      - name: Install deps (no lifecycle scripts)
        run: npm ci --ignore-scripts
      - name: Build native modules for system Node
        shell: bash
        run: ./scripts/rebuild-native-for-node.sh
      - name: Install Electron binary
        run: node node_modules/electron/install.js

      # electron-builder names the GitHub Release after package.json's version,
      # which is pinned at 1.0.0. Stamp it from the pushed tag (v1.2.0 -> 1.2.0)
      # so the release matches the tag. bash runs on all three runners (Git Bash
      # on Windows). --no-git-tag-version: don't commit/tag; --allow-same-version:
      # tolerate a tag that already equals package.json.
      - name: Set version from tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm run typecheck
      - run: npm test

      # Switch from Node-ABI to Electron-ABI for the app build + packaging.
      - name: Install Electron and rebuild native modules for Electron
        run: npm run postinstall

      - run: npm run build

      - name: Package & publish to the release
        # electron-builder uploads platform artifacts to a draft GitHub Release
        # named for the package version; review and publish it from the Releases page.
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned artifacts for now — skip macOS code-signing discovery.
          CSC_IDENTITY_AUTO_DISCOVERY: false
