name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux native build deps
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      # Skip the postinstall Electron-rebuild — vitest runs under system Node,
      # which can't load binaries built for Electron's ABI. Rebuild all native
      # modules (better-sqlite3, node-pty) for system Node instead. The build
      # job does the Electron-rebuild via the normal `npm ci` since it actually
      # packages the Electron app.
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run typecheck
      - run: npm test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    # Best-effort packaging across platforms — don't fail the whole run if one OS hiccups.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - run: npm ci

      - run: npm run build
      - name: Package
        run: npx electron-builder --publish never
        env:
          # Skip macOS code signing for CI artifacts.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taskman-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
          if-no-files-found: ignore
