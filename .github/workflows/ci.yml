name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux native build deps
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      # Skip the postinstall Electron-rebuild — vitest runs under system Node,
      # which can't load binaries built for Electron's ABI. Install without
      # lifecycle scripts, then build each native module for system Node via
      # node-gyp directly. `npm rebuild` doesn't work here: it re-runs the
      # `electron` package's install.js (which sets up Electron's V8 headers)
      # and node-gyp then targets Electron's ABI. Direct node-gyp calls
      # bypass that lifecycle and use the current Node's headers. The build
      # job keeps the normal `npm ci` since it actually packages the Electron
      # app and needs the Electron-ABI binary.
      - run: npm ci --ignore-scripts
      - name: Build native modules for system Node
        run: |
          for pkg in better-sqlite3 node-pty; do
            if [ -d "node_modules/$pkg" ]; then
              echo "→ $pkg"
              rm -rf "node_modules/$pkg/build"
              npx node-gyp rebuild --directory="node_modules/$pkg"
            fi
          done
      - run: npm run typecheck
      - run: npm test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    # Best-effort packaging across platforms — don't fail the whole run if one OS hiccups.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - run: npm ci

      - run: npm run build
      - name: Package
        run: npx electron-builder --publish never
        env:
          # Skip macOS code signing for CI artifacts.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taskman-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
          if-no-files-found: ignore
