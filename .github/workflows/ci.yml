name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux native build deps
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    # Best-effort packaging across platforms — don't fail the whole run if one OS hiccups.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      # On Windows, the node-gyp that ends up in node_modules (via transitive deps)
      # may be too old to locate VS 2022+ with vswhere. Split the install:
      #   1. npm ci --ignore-scripts  — installs packages without the postinstall
      #      native rebuild (electron-builder install-app-deps).
      #   2. Upgrade node-gyp in-place so @electron/rebuild uses a VS-aware version.
      #   3. Run the native rebuild explicitly with the updated node-gyp.
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm ci --ignore-scripts
          npm install --no-save --no-package-lock node-gyp@latest
          npx electron-builder install-app-deps
      - name: Install deps (non-Windows)
        if: runner.os != 'Windows'
        run: npm ci

      - run: npm run build
      - name: Package
        run: npx electron-builder --publish never
        env:
          # Skip macOS code signing for CI artifacts.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taskman-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
          if-no-files-found: ignore
